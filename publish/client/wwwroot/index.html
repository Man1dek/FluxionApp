<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluxion — AI-Powered Learning</title>
    <meta name="description" content="AI-orchestrated adaptive learning platform with kinetic curriculum." />
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="app.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <div style="display:flex; justify-content:center; align-items:center; height:100vh; background:#FAFBFC;">
            <div style="text-align:center;">
                <div
                    style="font-family:'Plus Jakarta Sans',sans-serif; font-size:1.8rem; font-weight:800; color:#0E0F14; letter-spacing:-0.5px; margin-bottom:1.5rem;">
                    FLUXION</div>
                <div
                    style="width:32px; height:32px; border:3px solid rgba(0,0,0,0.06); border-top-color:#4F46E5; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem;">
                </div>
                <div style="color:#8B90A5; font-size:0.85rem; font-family:'Plus Jakarta Sans',sans-serif;">Initializing…
                </div>
            </div>
        </div>
        <style>
            @keyframes spin {
                to {
                    transform: rotate(360deg)
                }
            }
        </style>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/kinetic.js"></script>
</body>

</html>
